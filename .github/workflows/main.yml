name: SSH Runner + Tailscale Funnel (Web Terminal)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  funnel-web-term:
    runs-on: ubuntu-latest
    env:
      TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}
      USERNAME: runner
      PASSWORD: runner
      TAILSCALE_HOSTNAME: gh-ssh-${{ github.run_id }}

    steps:
      - name: Setup user and password
        run: |
          echo "${USERNAME}:${PASSWORD}" | sudo chpasswd
          echo "${USERNAME} ALL=(ALL) NOPASSWD:ALL" | sudo tee /etc/sudoers.d/${USERNAME}

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sudo sh
          sudo tailscale up --authkey "${TAILSCALE_AUTHKEY}" --hostname "${TAILSCALE_HOSTNAME}"
          # Tailscale IP එක ලබාගන්න
          echo "TAILSCALE_IP=$(tailscale ip -4 | head -n1)" >> $GITHUB_ENV
          # Tailscale domain එක හොයන්න (MagicDNS අනුව)
          TS_DOMAIN="${TAILSCALE_HOSTNAME}.$(tailscale status --json | jq -r '.Self.DNSName' | cut -d '.' -f2- | head -n1)"
          echo "TS_DOMAIN=${TS_DOMAIN}" >> $GITHUB_ENV
          echo "Tailscale Domain: ${TS_DOMAIN}"

      - name: Download and run ttyd (pre-built)
        run: |
          # ttyd binary එක download කර install කරන්න (compile කරන්න ඕන නෑ)
          wget -q https://github.com/tsl0922/ttyd/releases/latest/download/ttyd.x86_64 -O ttyd
          chmod +x ttyd
          sudo mv ttyd /usr/local/bin/
          # ttyd start (port 8080, username/password authentication)
          nohup ttyd --port 8080 --credential "${USERNAME}:${PASSWORD}" bash > ttyd.log 2>&1 &
          sleep 2
          # port listen වෙනවද කියලා check කරන්න
          curl -s -o /dev/null -w "%{http_code}" http://localhost:8080 | grep -q 200 || {
            echo "ttyd failed to start"
            cat ttyd.log
            exit 1
          }

      - name: Expose via Tailscale Serve + Funnel
        run: |
          # Tailscale Serve enable (HTTPS 443 → local 8080)
          echo "Enabling Tailscale Serve..."
          sudo tailscale serve --bg --https=443 8080
          sleep 3
          # Tailscale Funnel enable
          echo "Enabling Tailscale Funnel..."
          sudo tailscale funnel --bg --https=443 8080
          sleep 2

          # Test Funnel (public internet එකෙන් වැඩ කරනවද?)
          echo "Testing funnel..."
          curl -s -o /dev/null -w "%{http_code}" "https://${TS_DOMAIN}" | grep -q 200 || {
            echo "Funnel may not be working. Check ACL/MagicDNS."
          }

      - name: Show Access Info
        run: |
          echo "========================================="
          echo "🌐 WEB TERMINAL (Tailscale Funnel)"
          echo "URL      : https://${TS_DOMAIN}"
          echo "USERNAME : ${USERNAME}"
          echo "PASSWORD : ${PASSWORD}"
          echo ""
          echo "බ්‍රවුසරයක ඉහත URL එක විවෘත කරන්න."
          echo "Username සහ Password ඇතුලත් කරන්න."
          echo "========================================="
          echo "This method is provided by @MR_English2008."
          echo "Join: https://t.me/ME2008_RDP"
          echo ">>> Keeping alive..."
          tail -f /dev/null
