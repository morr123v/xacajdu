name: Setup OpenBullet2 + Tailscale Funnel

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  setup-openbullet2:
    runs-on: ubuntu-latest
    env:
      TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}
      TAILSCALE_HOSTNAME: ob2-${{ github.run_id }}

    steps:
      - uses: actions/checkout@v4

      - name: Install .NET Runtime & ASP.NET Core
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq wget
          wget https://dot.net/v1/dotnet-install.sh -O dotnet-install.sh
          chmod +x dotnet-install.sh
          sudo ./dotnet-install.sh --channel 8.0 --runtime aspnetcore
          echo "DOTNET_ROOT=/usr/share/dotnet" | sudo tee -a /etc/environment
          echo "PATH=$PATH:/usr/share/dotnet" | sudo tee -a /etc/environment
          source /etc/environment
        shell: bash

      - name: Download & Setup OpenBullet2
        run: |
          mkdir -p ~/openbullet2
          cd ~/openbullet2
          wget https://github.com/openbullet/OpenBullet2/releases/latest/download/OpenBullet2.Web.zip
          unzip OpenBullet2.Web.zip -d .
          echo "OpenBullet2 extracted to ~/openbullet2"
        shell: bash

      - name: Install Tailscale
        run: |
          echo ">>> Installing Tailscale..."
          curl -fsSL https://tailscale.com/install.sh | sudo sh
          sudo tailscale up --authkey "${TAILSCALE_AUTHKEY}" --hostname "${TAILSCALE_HOSTNAME}"

      - name: Start OpenBullet2 & Configure Tailscale Funnel
        run: |
          cd ~/openbullet2
          nohup dotnet OpenBullet2.Web.dll > ob2.log 2>&1 &
          sleep 10
          echo "OpenBullet2 started on port 5000."
          echo ">>> Setting up Tailscale Funnel..."
          sudo tailscale funnel --https=443 --bg 5000
          echo "Funnel configured."
        shell: bash

      - name: Show Connection Information
        run: |
          TAILSCALE_IP=$(tailscale ip -4 | head -n1)
          echo "=== OPENBULLET2 + TAILSCALE FUNNEL INFO ==="
          echo "Tailscale IPv4: ${TAILSCALE_IP}"
          echo "Local Access: http://localhost:5000"
          echo ""
          FUNNEL_URL="https://${TAILSCALE_HOSTNAME}.ts.net"
          echo ">>> PUBLIC ACCESS URL (via Tailscale Funnel):"
          echo "    ${FUNNEL_URL}"
          echo ""
          echo "This setup is provided by @MR_English2008 on Telegram."
          echo "For more methods, join: https://t.me/ME2008_RDP"
          echo ">>> Keeping runner alive..."
          tail -f /dev/null
